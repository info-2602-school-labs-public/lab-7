{% extends "authenticated-base.html" %}

{% block subpage_content %}

<div class="container mt-4">

    <div class="card shadow-sm p-4">

        <h4 class="mb-3">
            Editing Todo - {{ todo.text }}
        </h4>

        <form method="POST" action="/editTodo/{{ todo.id }}">

            <div class="mb-3">
                <label class="form-label">New Todo Text</label>
                <input type="text"
                       name="text"
                       class="form-control"
                       value="{{ todo.text }}"
                       required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    Update
                </button>

                <a href="/app" class="btn btn-secondary">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
